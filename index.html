<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<title>Kotak EMI Calculator</title>
</head>

<body class="bg-gradient-to-br from-indigo-100 via-white to-purple-100 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 overflow-x-hidden">

<div class="max-w-xl mx-auto px-3">

  <div class="text-center mb-6 mt-6">
    <h1 class="text-3xl md:text-5xl font-bold text-gray-800 dark:text-white">💎 EMI Calculator</h1>
    <p class="text-sm text-gray-500">kotak Premium Finance Tool</p>
  </div>

  <div class="backdrop-blur-lg dark:bg-white/10 border border-white/30 dark:border-white/10 shadow-xl rounded-2xl p-4">

    <div class="space-y-4">

      <!-- PRICE -->
      <div class="relative">
        <input type="number" id="price" placeholder=" " oninput="updateFinance()"
        class="peer w-full p-4 pt-6 text-lg rounded-xl bg-white/60 dark:bg-gray-700/60 border focus:ring-2 focus:ring-indigo-400 outline-none">
        <label for="price"
        class="absolute left-4 top-2 text-sm text-gray-500">
        Price
        </label>
      </div>

      <!-- DOWN PAYMENT -->
      <div class="relative">
        <input type="number" id="downInput" placeholder=" " oninput="updateFinance()"
        class="peer w-full p-4 pt-6 text-lg rounded-xl bg-white/60 dark:bg-gray-700/60 border focus:ring-2 focus:ring-indigo-400 outline-none">
        <label for="downInput"
        class="absolute left-4 top-2 text-sm text-gray-500">
        Down Payment
        </label>
      </div>

      <!-- FINANCE -->
      <div class="grid grid-cols-2 gap-3">
        <div class="relative">
          <input type="number" id="finance"
          class="w-full p-4 pt-6 rounded-xl bg-gray-200 dark:bg-gray-600 text-lg">
          <label class="absolute left-4 top-2 text-sm text-gray-500">
          Finance
          </label>
        </div>

        <input type="number" id="addon" value="0" oninput="updateFinance()" class="hidden">
      </div>

      <!-- RATE + PROCESSING -->
      <div class="grid grid-cols-2 gap-3">

        <div class="relative">
          <input type="number" id="rate" value="11" oninput="updateFinance()"
          class="w-full p-4 pt-6 rounded-xl bg-white/60 dark:bg-gray-700/60">
          <label class="absolute left-4 top-2 text-sm text-gray-500">
          ROI %
          </label>
        </div>

        <div class="relative">
          <input type="number" id="processing" value="8000" oninput="updateFinance()"
          class="w-full p-4 pt-6 rounded-xl bg-white/60 dark:bg-gray-700/60">
          <label class="absolute left-4 top-2 text-sm text-gray-500">
          Processing
          </label>
        </div>

        <div style="display:none;">
          <input type="number" id="advance" value="0">
        </div>

      </div>

      <input type="number" id="doc" value="0" class="hidden">
      <input type="number" id="stamp" value="0" class="hidden">
      <input type="number" id="handling" value="0" class="hidden">

    </div>

    <!-- BUTTONS -->
    <div class="flex gap-3 mt-6">
      <button onclick="calculateAll()" class="flex-1 py-3 text-lg rounded-xl bg-gradient-to-r from-red-200 to-pink-200 shadow-md">Calculate</button>
      <button onclick="resetForm()" class="flex-1 py-3 text-lg rounded-xl bg-gradient-to-r from-indigo-200 to-purple-400 shadow-md">Reset</button>
    </div>

    <!-- RESULT -->
    <div class="mt-6 p-4 rounded-xl bg-white/60 dark:bg-gray-700/60 border text-sm">

      <div class="flex justify-between items-center">
        <span>Charges</span>
        <span class="font-semibold">₹<span id="valA">0</span></span>
      </div>

      <div class="flex justify-between items-center mt-2">
        <span>Net Finance</span>
        <span class="font-semibold">₹<span id="valB">0</span></span>
      </div>

    </div>

    <!-- EMI RESULTS -->
    <div class="mt-6 space-y-3" id="tenureResults"></div>

  </div>
</div>

<script>

function updateFinance() {

  let price = +priceEl().value || 0;
  let down = +downEl().value || 0;

  let addon = +addonEl().value || 0;
  let processing = +procEl().value || 0;   // FIXED VALUE
  let doc = +docEl().value || 0;
  let stamp = +stampEl().value || 0;
  let handling = +handEl().value || 0;

  let totalCharges = processing + doc + stamp + handling;

  let finance = price - down + totalCharges;

  if (finance < 0) finance = 0;

  financeEl().value = finance.toFixed(2);

  document.getElementById("valA").innerText = totalCharges.toFixed(2);
  document.getElementById("valB").innerText = finance.toFixed(2);
}

function calculateAll() {

  let tenures = [12,18,24,30,36,48,60];

  let finance = +financeEl().value || 0;
  let addon = +addonEl().value || 0;
  let rate = +rateEl().value || 0;

  let output = "";

  tenures.forEach(t => {

    let loanAmount = finance + addon;

    let interest = (loanAmount * rate * t) / (100 * 12);
    let total = loanAmount + interest;
    let emi = total / t;

    output += `
      <div class="border rounded-xl p-4 bg-white/70 dark:bg-gray-700/70 shadow">
        <div class="text-center font-semibold text-lg">
          ${t} Months EMI
          <span class="text-green-700 block text-xl">₹${emi.toFixed(0)}</span>
        </div>

        <div class="flex justify-between mt-3 text-sm">
          <span>Interest</span>
          <span>₹${interest.toFixed(0)}</span>
        </div>

        <div class="flex justify-between text-sm">
          <span>Total</span>
          <span class="font-semibold">₹${total.toFixed(0)}</span>
        </div>
      </div>
    `;
  });

  document.getElementById("tenureResults").innerHTML = output;
}

// helpers
const priceEl = () => document.getElementById("price");
const downEl = () => document.getElementById("downInput");
const financeEl = () => document.getElementById("finance");
const addonEl = () => document.getElementById("addon");
const rateEl = () => document.getElementById("rate");
const procEl = () => document.getElementById("processing");
const docEl = () => document.getElementById("doc");
const stampEl = () => document.getElementById("stamp");
const handEl = () => document.getElementById("handling");

function resetForm(){
 location.reload();
}

updateFinance();

</script>

</body>
</html>
